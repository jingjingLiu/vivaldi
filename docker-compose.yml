services:
  mysql:
    image: mysql:8.0
    container_name: vivaldi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_pwd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vivaldi}
      MYSQL_USER: ${MYSQL_USER:-vivaldi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vivaldi_dev_pwd}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      - --default-time-zone=+08:00
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - vivaldi-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_dev_pwd}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  vivaldi-mysql-data:
    name: vivaldi-mysql-data
